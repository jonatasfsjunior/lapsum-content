name: Trigger deploy

on:
  push:
    branches: [master]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar rebuild no repo principal
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository: jonatasfsjunior/lapsum-criativo
          event-type: content-updated
          client-payload: |
            {"ref": "${{ github.ref }}",
             "sha": "${{ github.sha }}"}
